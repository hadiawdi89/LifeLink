{% extends "base_admin.html" %}
{% block title %}Log in — LifeLink{% endblock %}
{% block admin_body %}
  <div class="card" style="max-width:420px;margin:0 auto;">
    <h1>Log in</h1>
    
    // posts to the auth.login route

    <form method="POST" action="{{ url_for('auth.login') }}">
      <label>Email</label>
      <input type="email" name="email" required />
      <label>Password</label>
      <input type="password" name="password" required />
      <label style="display:flex;gap:8px;align-items:center;width:auto;">
        <input type="checkbox" name="remember" style="width:auto;margin:0;" /> Remember me
      </label>
      <button class="btn" type="submit">Log in</button>
    </form>
    <p>No account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
  </div>
{% endblock %}
